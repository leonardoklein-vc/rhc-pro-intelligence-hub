<style>
  /* =========================================================================
     1. IMPORTAÇÕES E VARIÁVEIS GLOBAIS
     ========================================================================= */
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Open+Sans:wght@400;600&display=swap');
  @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css');

  :root {
    /* Paleta RHC Pro */
    --rhc-primary: #005A3C;
    --rhc-secondary: #2D8B5D;
    --rhc-accent: #E6A817;
    
    /* Cores de Base e UI */
    --bg-main: #f4f7f6;
    --bg-card: #ffffff;
    --text-dark: #2c3e50;
    --text-muted: #7f8c8d;
    --border-color: #eee;
    
    /* Cores de Feedback / Ação */
    --color-info: #3498db;
    --color-info-hover: #2980b9;
    --color-success: #27ae60;
    --color-warning: #eccc68;
    --color-danger: #e74c3c;
    --color-disabled: #cbd5e1;
    --text-disabled: #64748b;

    /* Fontes */
    --font-heading: 'Montserrat', sans-serif;
    --font-body: 'Open Sans', sans-serif;
  }

  /* =========================================================================
     2. RESET E BASE
     ========================================================================= */
  *, *::before, *::after {
    box-sizing: border-box;
  }

  body { 
    font-family: var(--font-body); 
    background-color: var(--bg-main); 
    color: var(--text-dark); 
    margin: 0; 
    padding: 0; 
  }

  /* =========================================================================
     3. ESTRUTURA PRINCIPAL (LAYOUT)
     ========================================================================= */
  .header { 
    background-color: var(--rhc-primary); 
    padding: 20px; 
    color: white; 
    text-align: center; 
    border-bottom: 4px solid var(--rhc-accent); 
  }

  .header h2 { 
    margin: 0; 
    font-family: var(--font-heading); 
    font-size: 18px; 
    letter-spacing: 1px; 
    text-transform: uppercase; 
  }

  .container { 
    padding: 20px; 
  }

  /* =========================================================================
     4. COMPONENTES DE NAVEGAÇÃO (ABAS)
     ========================================================================= */
  .nav-tabs { 
    display: flex; 
    background-color: var(--rhc-primary); 
    padding: 10px 5px 0; 
    gap: 4px; 
  }

  .nav-item { 
    flex: 1;
    padding: 10px 15px; 
    background-color: var(--rhc-secondary); 
    color: white; 
    border-radius: 6px 6px 0 0; 
    font-size: 12px; 
    font-weight: bold; 
    cursor: pointer; 
    transition: background-color 0.2s, color 0.2s; 
    border: none; 
  }

  .nav-item.active { 
    background-color: var(--bg-main); 
    color: var(--rhc-primary); 
  }

  .nav-item.disabled { 
    background-color: #1a4134; 
    color: var(--text-muted); 
    cursor: not-allowed; 
    opacity: 0.7; 
  }

  /* =========================================================================
     5. CARTÕES E TIPOGRAFIA INTERNA
     ========================================================================= */
  .step-card { 
    background-color: var(--bg-card); 
    border-radius: 8px; 
    padding: 15px; 
    margin-bottom: 15px; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
    border-left: 4px solid var(--rhc-secondary); 
  }

  .step-title { 
    font-family: var(--font-heading); 
    font-size: 14px; 
    font-weight: 700; 
    color: var(--rhc-primary); 
    margin-bottom: 10px; 
    display: flex; 
    align-items: center; 
    gap: 8px; 
  }

  .step-desc { 
    font-size: 11px; 
    color: var(--text-muted); 
    margin-top: 0; 
    margin-bottom: 12px; 
    line-height: 1.4; 
  }

  .section-label { 
    font-size: 12px; 
    font-weight: 700; 
    color: var(--text-muted); 
    text-transform: uppercase; 
    margin-bottom: 10px; 
    border-bottom: 1px solid var(--border-color); 
    padding-bottom: 5px; 
  }

  /* =========================================================================
     6. BOTÕES E LINKS DE AÇÃO
     ========================================================================= */
  .action-btn { 
    width: 100%; 
    background-color: var(--rhc-secondary); 
    color: white !important; 
    border: none; 
    padding: 12px; 
    border-radius: 6px; 
    font-weight: 600; 
    font-size: 13px; 
    cursor: pointer; 
    transition: all 0.2s; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    gap: 8px; 
    text-decoration: none !important;
    box-sizing: border-box; /* Previne que o padding aumente o tamanho total */
  }

  .action-btn:hover { 
    background-color: var(--rhc-primary); 
    transform: translateY(-2px); 
    box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
  }

  .action-btn:disabled, 
  .action-btn[disabled] { 
    background-color: var(--color-disabled) !important; 
    color: var(--text-disabled) !important; 
    cursor: not-allowed; 
    transform: none; 
    box-shadow: none; 
  }

  /* Este botão precisava de !important para sobrescrever as cores base */
  .btn-next-step { 
    background-color: var(--color-info) !important; 
    margin-top: 10px; 
  }

  .btn-next-step:hover { 
    background-color: var(--color-info-hover) !important; 
  }

  .lock-btn { 
    width: 100%; 
    margin-top: 15px; 
    padding: 12px; 
    background-color: #34495e; 
    color: white; 
    font-size: 13px; 
    font-weight: bold; 
    border: none; 
    border-radius: 6px; 
    cursor: pointer; 
    transition: background-color 0.3s; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    gap: 8px; 
    box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
  }

  .lock-btn:hover { 
    background-color: var(--text-dark); 
  }

  .lock-btn.locked { 
    background-color: var(--color-success); 
    cursor: default; 
  }

  /* =========================================================================
     7. COMPONENTES DO PASSO 2 (CORES E FILTROS)
     ========================================================================= */
  .swatch-container { 
    display: flex; 
    flex-wrap: wrap; 
    gap: 12px; 
    justify-content: space-between; 
    margin-bottom: 20px; 
  }

  .swatch { 
    width: 35px; 
    height: 35px; 
    border-radius: 50%; 
    cursor: pointer; 
    transition: transform 0.2s, box-shadow 0.2s; 
    box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
    border: 2px solid transparent; 
  }

  .swatch:hover { 
    transform: scale(1.15); 
    box-shadow: 0 4px 8px rgba(0,0,0,0.2); 
  }

  .swatch.white { 
    border-color: #bdc3c7; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    color: var(--color-danger); 
    font-size: 18px; 
  }

  .pill-container { 
    display: flex; 
    flex-wrap: wrap; 
    gap: 8px; 
  }

  .filter-pill { 
    flex: 1 1 30%; 
    background-color: #f1f2f6; 
    border: 1px solid #dfe4ea; 
    border-radius: 20px; 
    padding: 8px 5px; 
    font-size: 11px; 
    font-weight: 600; 
    color: #576574; 
    cursor: pointer; 
    transition: all 0.2s; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    gap: 5px; 
  }

  .filter-pill:hover { 
    background-color: var(--color-warning); 
    color: #2f3542; 
    border-color: var(--color-warning); 
  }

  .filter-pill.active { 
    background-color: var(--color-info); 
    color: white; 
    border-color: var(--color-info); 
  }

  /* =========================================================================
     8. TOOLTIPS
     ========================================================================= */
  .tooltip { 
    position: relative; 
    display: inline-block; 
    cursor: help; 
    color: var(--color-info); 
    margin-left: auto; 
  }

  .tooltip .tooltiptext { 
    visibility: hidden; 
    width: 220px; 
    background-color: var(--text-dark); 
    color: #fff; 
    text-align: center; 
    border-radius: 6px; 
    padding: 10px; 
    font-size: 11px; 
    font-weight: normal; 
    font-family: var(--font-body); 
    position: absolute; 
    z-index: 10; 
    bottom: 125%; 
    right: -50%; 
    opacity: 0; 
    transition: opacity 0.3s; 
    box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
    line-height: 1.4; 
  }

  .tooltip .tooltiptext::after { 
    content: ""; 
    position: absolute; 
    top: 100%; 
    right: 15px; 
    border-width: 5px; 
    border-style: solid; 
    border-color: var(--text-dark) transparent transparent transparent; 
  }

  .tooltip:hover .tooltiptext { 
    visibility: visible; 
    opacity: 1; 
  }

  /* =========================================================================
     9. FEEDBACKS VISUAIS E ANIMAÇÕES
     ========================================================================= */
  #notification { 
    display: none; 
    padding: 15px; 
    border-radius: 6px; 
    margin: 20px; 
    font-size: 13px; 
    font-weight: 600; 
    text-align: left; 
    line-height: 1.4; 
  }

  .success { 
    background-color: #dcfce7; 
    color: #166534; 
    border: 1px solid #bbf7d0; 
    border-left: 4px solid #166534;
  }

  .error { 
    background-color: #fee2e2; 
    color: #991b1b; 
    border: 1px solid #fecaca; 
    border-left: 4px solid #991b1b;
  }

  .loader-container { 
    display: none; 
    text-align: center; 
    color: var(--rhc-primary); 
    font-weight: bold; 
    font-size: 13px; 
    margin: 20px 0; 
  }

  .fa-spinner { 
    animation: spin 1s linear infinite; 
    margin-right: 5px; 
    font-size: 16px;
  }

  .view { 
    display: none; 
  }

  .view.active { 
    display: block; 
    animation: fadeIn 0.3s ease-in-out; 
  }

  @keyframes spin { 
    100% { transform: rotate(360deg); } 
  }

  @keyframes fadeIn { 
    from { opacity: 0; } 
    to { opacity: 1; } 
  }
</style>
